  # * Top level
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        exclude: ^uv[.]lock
      - id: check-case-conflict
      - id: check-merge-conflict
        args: [--assume-in-merge]
      - id: check-yaml
      - id: check-toml
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending

  # * toml/pyproject.toml
  # ** format
  - repo: https://github.com/ComPWA/taplo-pre-commit
    rev: v0.9.3
    hooks:
      - id: taplo-format
        # exclude: (^|/)pyproject\.toml$
      - id: taplo-lint
        args: ["--no-schema"]
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: v2.21.1
    hooks:
      - id: pyproject-fmt
  # ** validate (schema-store)
  - repo: https://github.com/henryiii/validate-pyproject-schema-store
    rev: 2026.04.11
    hooks:
      - id: validate-pyproject
        name: validate-pyproject-schema-store
        stages: [manual]
  # ** repo review
  - repo: https://github.com/scientific-python/cookie
    rev: 2026.04.04
    hooks:
      - id: sp-repo-review
        stages: [manual]

  # * Prettier
  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.8.2
    hooks:
      - id: prettier
        alias: markdownlint
        stages: [pre-commit, manual]
        args:
          - "--cache"
          - "--cache-location=.prettier_cache/cache"

  # * Markdown
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.0
    hooks:
      - id: markdownlint-cli2
        alias: markdownlint
        args: [--style, prettier]
        # language_version: 10.9.0

  # Just
  - repo: https://github.com/wpk-nist-gov/just-pre-commit
    rev: v1.49.0
    hooks:
      - id: justfile-format

  # * Linting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff-check
        alias: ruff
        args: [--fix, --show-fixes]
        types_or: &ruff_types [python, pyi, jupyter, markdown]
      - id: ruff-format
        alias: ruff
        types_or: *ruff_types

  # * Spelling
  # ** typos
  - repo: https://github.com/adhtruong/mirrors-typos
    rev: v1.45.1
    hooks:
      - id: typos
        exclude_types: [jupyter]
        exclude: ^uv[.]lock$|^requirements

  # * Dependencies
  # ** pyproject2conda
  - repo: https://github.com/usnistgov/pyproject2conda
    rev: v0.22.1
    hooks:
      - id: pyproject2conda-project
        alias: requirements
        args:
          - "--custom-command=prek run pyproject2conda-project --all-files"
  # ** uv
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.6
    hooks:
      - id: uv-lock
        alias: requirements
        args: [--locked]
      - id: pip-compile
        alias: requirements
        entry: python tools/requirements_lock.py
        pass_filenames: true
        files: ^requirements/[^/]*\.txt$

  # * Commit message
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.10
    hooks:
      - id: commitizen
        stages: [commit-msg]

  # * Cog
  - repo: local
    hooks:
      - id: cog-readme
        name: cog-readme
        alias: cog
        entry: >
          python tools/cog_runner.py --group=cog --group=optional-dependencies
          --no-dev --no-active -- README.md
        language: python
        pass_filenames: false
        stages: [manual]

  # * Actions
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.1
    hooks:
      - id: check-github-workflows
        alias: actions
        priority: 0
      - id: check-github-actions
        alias: actions
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
        alias: actions
        stages: [manual]
        args:
          - "-ignore=SC2129" # ignorable stylistic lint from shellcheck
          - "-ignore=SC2016" # another shellcheck lint: seems to have false positives?
        language: golang # means renovate will also update `additional_dependencies`
        additional_dependencies:
          # actionlint has a shellcheck integration which extracts shell scripts in `run:` steps from GitHub Actions
          # and checks these with shellcheck. This is arguably its most useful feature,
          # but the integration only works if shellcheck is installed
          - "github.com/wasilibs/go-shellcheck/cmd/shellcheck@v0.11.1"
        # see https://github.com/rhysd/actionlint/issues/46
        exclude: ^\.github/actions
        priority: 0
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    # Zizmor version.
    rev: v1.24.1
    hooks:
      # Run the linter.
      - id: zizmor
        alias: actions

  # * Other tools --------------------------------------------------------------

  - repo: https://github.com/jsh9/markdown-toc-creator
    rev: 0.1.3
    hooks:
      - id: markdown-toc-creator
        files: ^README\.md$
        alias: markdownlint
        args:
          - --proactive=False
          - --add-toc-title=False
          - --horizontal-rule-style=prettier

  # local hooks
  - repo: local
    hooks:
      # ** Update "rev" in README.md
      - id: sync-readme-rev-version
        name: sync-readme-rev-version
        description: update rev version in README.md
        entry: python tools/sync_readme_rev_version.py
        language: python
        pass_filenames: false
        files: ^pyproject\.toml|^README\.md
      # ** local version of sync-pre-commit-hooks
      - id: forbidden-files
        name: forbidden files
        entry: Found forbidden file.
        language: fail
        files: \.(rej|bak|log)$
      - id: sync-pre-commit-deps
        name: sync-pre-commit-deps
        entry: sync-pre-commit-deps
        language: python
        files: >-
          ^\.pre-commit-config\.yaml$
        pass_filenames: false
        additional_dependencies:
          - "--editable=.[all]"
      - id: sync-uv-build-deps
        name: sync-uv-build-deps
        entry: sync-uv-build-deps
        language: python
        files: ^pyproject\.toml$|^\.pre-commit-config\.yaml$
        pass_filenames: false
        additional_dependencies:
          - "--editable=.[all]"
      - id: sync-uv-dependency-groups
        name: sync-uv-dependency-groups
        entry: sync-uv-dependency-groups
        language: python
        files: ^pyproject.toml$|^\.python-version$
        pass_filenames: false
        additional_dependencies:
          - "--editable=.[all]"
      - id: sync-pre-commit-language-version
        name: sync-pre-commit-language-version
        entry: sync-pre-commit-language-version
        language: python
        args:
          - "--language-version-file=.python-version"
          - "--hook=typecheck"
        files: ^\.python-version$
        pass_filenames: false
        additional_dependencies:
          - "--editable=.[all]"
      - id: fill-pre-commit-hook-deps
        name: fill-pre-commit-hook-deps
        alias: typecheck
        entry: fill-pre-commit-deps
        language: python
        files: ^pyproject.toml$|^\.pre-commit-config.yaml$|^requirements/lock/uvx-tools\.txt$
        pass_filenames: false
        args:
          - "--hook=typecheck-runner"
          - "--group=type"
          - "--exclude=pylint"
          - "--requirements=requirements/lock/uvx-tools.txt"
          - "--requirements-include=ty"
          - "--requirements-include=pyrefly"
        additional_dependencies:
          - "--editable=.[all]"

  # ** typecheck-runner
  - repo: https://github.com/wpk-nist-gov/typecheck-runner
    rev: v0.2.0
    hooks:
      - id: typecheck-runner
        alias: typecheck
        args:
          - "--no-uv"
          - "-v"
          - "--check=ty"
          - "--check=pyrefly"
        files: ^(src/|tests/)
        language_version: "3.14"
        stages: [manual]
        additional_dependencies:
          - dependency-groups>=1.3.1
          - lastversion>=3.6.10
          - nox>=2026.2.9
          - packaging>=26.0
          - pyrefly==0.59.1
          - pytest>=9.0.2
          - requirements-parser>=0.13.0
          - ruamel-yaml>=0.19.1
          - tomli>=2.4.1; python_version < "3.11"
          - tomlkit>=0.14.0
          - ty==0.0.29
          - typecheck-runner>=0.1.6; python_version > "3.9"
          - typing-extensions>=4.15.0; python_version < "3.12"
